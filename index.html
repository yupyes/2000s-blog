    <!-- music player -->

<div class="window" style="width:320px; margin: 20px auto;">

        <!-- artist + title labels -->
        <div class="ahhh">

</div>



    <!-- main two‑column layout -->
    <div class="layout">

        <!-- left side -->
        <div class="left-col">

            <!-- about me box -->
            <div class="box about">
                <h2>about me</h2>
                <p>birthday: 12/04/2000</p>
                <p>location: my room</p>
                <p>mood: HAPPY YES OMG</p>
            </div>

            <!-- top 5 friends -->
            <div class="box top 5 ">
                <h2>top 5</h2>
                <ul>
                    <li></li><li></li><li></li><li></li><li></li>
                </ul>
            </div>
        </div>

        <!-- right side -->
        <div class="right-col">

            <!-- blog box -->
            <div class="box blog">
                <h2>latest blog entry</h2>
                <p>this is my new blog omg hii</p>

                <div id="updateList"></div>

                <!-- update input -->
                <p>
                    <textarea id="updateText" placeholder="your update"></textarea>
                    <button id="submitUpdate">post</button>
                    last updated: <span id="lastUpdated"></span>
                </p>
            </div>

            <!-- comments box -->
            <div class="box comments">
                <h2>comments</h2>
                <p>no comments yet… be the first!</p>

                <div id="commentList"></div>

                <!-- comment input -->
                <div class="add-comment">
                    <textarea id="commentText" placeholder="your comment"></textarea>
                    <button id="submitComment">post</button>
                </div>
            </div>

        </div>
    </div>

    <!-- comment system + update timestamp -->
    <script>

        /* timestamp for updates */
        const updatedSpan = document.getElementById("lastUpdated");

        /* comment system elements */
        const list = document.getElementById("commentList");
        const textInput = document.getElementById("commentText");
        const button = document.getElementById("submitComment");

        /* load saved comments */
        let comments = JSON.parse(localStorage.getItem("comments")) || [];

        /* display comments */
        function renderComments() {
            list.innerHTML = "";

            comments.forEach((c, index) => {
                const comment = document.createElement("div");
                comment.className = "comment";
                comment.innerHTML = `
                    <p>${c.text}</p>
                    <p class="date">${c.date}</p>
                    <button class="deleteComment" data-index="${index}" style="display:none;">delete</button>
                `;
                list.prepend(comment);
            });

            /* show delete buttons only if ?admin is in URL */
            if (window.location.search.includes("admin")) {
                document.querySelectorAll(".deleteComment").forEach(btn => {
                    btn.style.display = "inline-block";
                });
            }
        }

        renderComments();

        /* add new comment */
        button.addEventListener("click", () => {
            const text = textInput.value.trim();
            if (!text) return;

            comments.push({
                text: text,
                date: new Date().toLocaleString()
            });

            localStorage.setItem("comments", JSON.stringify(comments));
            renderComments();
            textInput.value = "";
        });

        /* delete comment (admin only) */
        list.addEventListener("click", (event) => {
            if (event.target.classList.contains("deleteComment")) {
                const index = event.target.dataset.index;
                comments.splice(index, 1);
                localStorage.setItem("comments", JSON.stringify(comments));
                renderComments();
            }
        });

    </script>

</body>
</html>
